<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>PayNow - Scrum Fintech</title>

  <!-- Fonte Bordone -->
  <link href="https://fonts.cdnfonts.com/css/bodoni" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:
      linear-gradient(135deg,#02141a,#062a33,#00b7b7);
      font-family: Arial, sans-serif;
      color:white;
      overflow-x:hidden;
    }

    body::before{
      content:'';
      position:fixed;
      width:600px;
      height:600px;
      background:#00ffff25;
      border-radius:50%;
      filter:blur(120px);
      top:-150px;
      left:-150px;
      z-index:-1;
    }

    body::after{
      content:'';
      position:fixed;
      width:500px;
      height:500px;
      background:#00fff020;
      border-radius:50%;
      filter:blur(120px);
      bottom:-100px;
      right:-100px;
      z-index:-1;
    }

    .slide{
      min-height:100vh;
      padding:60px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      gap:30px;
      border-bottom:1px solid rgba(255,255,255,0.1);
    }

    .title{
      font-family:'Bodoni', serif;
      font-size:4rem;
      color:#7ffcff;
      text-shadow:0 0 20px rgba(127,252,255,0.5);
    }

    .subtitle{
      font-size:1.4rem;
      max-width:900px;
      line-height:1.7;
      color:#e6ffff;
    }

    .cards{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:25px;
      margin-top:20px;
    }

    .card{
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.1);
      backdrop-filter:blur(15px);
