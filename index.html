<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PayNow Bank</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #041C32, #04293A);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }

    .container {
      width: 400px;
      background: rgba(255,255,255,0.08);
      padding: 30px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 20px rgba(0,0,0,0.3);
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      color: #00E5FF;
    }

    h2 {
      margin-bottom: 10px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      border: none;
      border-radius: 10px;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #00E5FF;
      color: black;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 10px;
    }

    button:hover {
      opacity: 0.9;
    }

    .logout {
      background: crimson;
      color: white;
    }

    .hidden {
      display: none;
    }

    hr {
      margin: 20px 0;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .actions {
      margin-top: 15px;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>PAYNOW BANK</h1>

  <div id="authArea">
    <h2>Criar Conta</h2>

    <input type="text" id="registerName" placeholder="Nome completo">
    <input type="email" id="registerEmail" placeholder="Email">
    <input type="password" id="registerPassword" placeholder="Senha">

    <button onclick="register()">Criar Conta</button>

    <hr>

    <h2>Entrar</h2>

    <input type="email" id="loginEmail" placeholder="Email">
    <input type="password" id="loginPassword" placeholder="Senha">

    <button onclick="login()">Entrar</button>
  </div>

  <div id="dashboard" class="hidden">
    <h2>Bem-vindo(a)</h2>

    <p><strong>Nome:</strong> <span id="userName"></span></p>
    <p><strong>Email:</strong> <span id="userEmail"></span></p>
    <p><strong>Saldo:</strong> R$ <span id="userBalance"></span></p>

    <div class="actions">
      <input type="number" id="depositValue" placeholder="Valor depósito">
      <button onclick="deposit()">Depositar</button>
    </div>

    <div class="actions">
      <input type="number" id="withdrawValue" placeholder="Valor saque">
      <button onclick="withdraw()">Sacar</button>
    </div>

    <button class="logout" onclick="logout()">Sair</button>
  </div>
</div>

<script>
  function register() {
    const name = document.getElementById('registerName').value;
    const email = document.getElementById('registerEmail').value;
    const password = document.getElementById('registerPassword').value;

    if (!name || !email || !password) {
      alert('Preencha todos os campos');
      return;
    }

    const user = {
      name,
      email,
      password,
      balance: 0
    };

    localStorage.setItem(email, JSON.stringify(user));

    alert('Conta criada com sucesso!');
  }

  function login() {
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;

    const user = JSON.parse(localStorage.getItem(email));

    if (!user) {
      alert('Usuário não encontrado');
      return;
    }

    if (user.password !== password) {
      alert('Senha incorreta');
      return;
    }

    localStorage.setItem('loggedUser', email);

    loadDashboard();
  }

  function loadDashboard() {
    const email = localStorage.getItem('loggedUser');

    if (!email) return;

    const user = JSON.parse(localStorage.getItem(email));

    document.getElementById('authArea').classList.add('hidden');
    document.getElementById('dashboard').classList.remove('hidden');

    document.getElementById('userName').innerText = user.name;
    document.getElementById('userEmail').innerText = user.email;
    document.getElementById('userBalance').innerText = user.balance.toFixed(2);
  }

  function deposit() {
    const value = Number(document.getElementById('depositValue').value);

    if (value <= 0) {
      alert('Digite um valor válido');
      return;
    }

    const email = localStorage.getItem('loggedUser');
    const user = JSON.parse(localStorage.getItem(email));

    user.balance += value;

    localStorage.setItem(email, JSON.stringify(user));

    loadDashboard();
  }

  function withdraw() {
    const value = Number(document.getElementById('withdrawValue').value);

    const email = localStorage.getItem('loggedUser');
    const user = JSON.parse(localStorage.getItem(email));

    if (value > user.balance) {
      alert('Saldo insuficiente');
      return;
    }

    user.balance -= value;

    localStorage.setItem(email, JSON.stringify(user));

    loadDashboard();
  }

  function logout() {
    localStorage.removeItem('loggedUser');
    location.reload();
  }

  loadDashboard();
